global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: capacity-engine
    static_configs:
      - targets: ['engine:8001']
    metrics_path: /metrics

  - job_name: capacity-agent
    static_configs:
      - targets: ['agent:8000']
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
